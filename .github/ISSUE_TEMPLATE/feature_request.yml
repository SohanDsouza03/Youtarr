name: Feature Request
description: Suggest an idea or enhancement for Youtarr
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement! For larger features, please review the
        [Contributing guide](https://github.com/DialmasterOrg/Youtarr/blob/main/CONTRIBUTING.md)
        first — significant changes should be discussed before implementation.
  - type: textarea
    id: problem
    attributes:
      label: Problem or motivation
      description: What problem would this feature solve? What are you trying to do?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe the feature or change you would like to see.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any alternative solutions or workarounds you have considered.
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add any other context, mockups, or screenshots here.
